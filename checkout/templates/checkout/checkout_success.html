{% extends "base.html" %}

{% block content %}
<div class="content-backdrop"></div>

<div class="container mt-3">
    <div class="row">
        <div class="col">
            <!-- Order confirmation summary -->
            <h2 class="logo-font">Order confirmed</h2>
            <hr>
            <p class="mb-2">
                Thank you for your order.
            </p>
            <p class="mb-0">
                Reference: <strong>{{ order.reference }}</strong>
            </p>
            <p class="mb-0">
                Confirmation email: <strong>{{ order.email }}</strong>
            </p>
        </div>
    </div>
</div>
{% endblock %}
