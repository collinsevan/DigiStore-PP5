<!-- Bag item quantity controls -->
<form action="{% url 'adjust_bag' item.item_id %}" method="POST" class="update-form">
    {% csrf_token %}
    <div class="input-group input-group-sm">
        <div class="input-group-prepend">
            <button type="button" class="decrement-qty btn btn-black rounded-0 btn-sm px-2"
                data-item_id="{{ item.item_id }}" id="decrement-qty_{{ item.item_id }}">
                <span>
                    <i class="fas fa-minus fa-sm"></i>
                </span>
            </button>
        </div>

        <input class="form-control form-control-sm qty_input" type="number" name="quantity" value="{{ item.quantity }}"
            min="1" max="99" data-item_id="{{ item.item_id }}" id="id_qty_{{ item.item_id }}">

        <div class="input-group-append">
            <button type="button" class="increment-qty btn btn-black rounded-0 btn-sm px-2"
                data-item_id="{{ item.item_id }}" id="increment-qty_{{ item.item_id }}">
                <span>
                    <i class="fas fa-plus fa-sm"></i>
                </span>
            </button>
        </div>

        <!-- Hidden submit target -->
        <button type="submit" class="d-none">Update</button>
    </div>
</form>

<a class="update-link text-info small mr-3">Update</a>

<a class="remove-item text-danger small" id="remove_{{ item.item_id }}"
    data-url="{% url 'remove_from_bag' item.item_id %}">
    Remove
</a>
