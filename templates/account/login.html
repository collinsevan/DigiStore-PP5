{% extends "account/base.html" %}
{% load i18n %}
{% load account %}

{% block inner_content %}

<!-- Sign in heading -->
<h2 class="logo-font mb-4 text-black text-center">Sign In</h2>
<hr>

<!-- Sign up prompt for new users -->
<p class="text-muted text-center">
    If you have not created an account yet, then please
    <a href="{% url 'account_signup' %}">sign up</a> first.
</p>

<!-- Allauth login form -->
<form method="POST" action="{% url 'account_login' %}">
    {% csrf_token %}

    <!-- Login field -->
    <div class="form-group">
        <label for="id_login">Username or Email</label>
        <input class="form-control rounded-0" type="text" name="login" placeholder="Username or Email"
            autocomplete="username" required id="id_login">
    </div>

    <!-- Password field -->
    <div class="form-group">
        <label for="id_password">Password</label>
        <input class="form-control rounded-0" type="password" name="password" placeholder="Password"
            autocomplete="current-password" required id="id_password">
    </div>

    <!-- Remember me checkbox -->
    <div class="form-group form-check">
        <input class="form-check-input" type="checkbox" name="remember" id="id_remember">
        <label class="form-check-label" for="id_remember">Remember Me</label>
    </div>

    <!-- Redirect user after successful login -->
    {% if redirect_field_value %}
    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
    {% endif %}

    <!-- Account actions -->
    <div class="d-flex justify-content-between align-items-center flex-wrap mt-4">
        <a href="{% url 'home' %}" class="btn btn-outline-black rounded-0 text-uppercase mb-2 mb-sm-0">
            Home
        </a>

        <button class="btn btn-black rounded-0 text-uppercase mb-2 mb-sm-0" type="submit">
            Sign In
        </button>
    </div>

    <!-- Password reset link -->
    <p class="small mt-3 mb-0 text-center">
        <a href="{% url 'account_reset_password' %}">Forgot your password?</a>
    </p>
</form>
{% endblock %}
