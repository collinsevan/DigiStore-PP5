{% extends "account/base.html" %}
{% load i18n %}

{% block inner_content %}

<!-- Password reset heading -->
<h2 class="logo-font mb-4 text-black text-center">Password Reset</h2>
<hr>

<!-- Password reset help text -->
<p class="text-muted text-center">
    Forgotten your password? Enter your email address below and we’ll send you a link to reset it.
</p>

<!-- Password reset form -->
<form method="POST" action="{% url 'account_reset_password' %}">
    {% csrf_token %}

    <!-- Email field -->
    <div class="form-group">
        <label for="id_email">Email</label>
        <input class="form-control rounded-0" type="email" name="email" placeholder="Email address"
            autocomplete="email" required id="id_email">
    </div>

    <!-- Page actions -->
    <div class="d-flex justify-content-between align-items-center flex-wrap mt-4">
        <a href="{% url 'account_login' %}" class="btn btn-outline-black rounded-0 text-uppercase mb-2 mb-sm-0">
            Back to Sign In
        </a>

        <button class="btn btn-black rounded-0 text-uppercase mb-2 mb-sm-0" type="submit">
            Reset Password
        </button>
    </div>
</form>

{% endblock %}
