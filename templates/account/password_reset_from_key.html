{% extends "account/base.html" %}
{% load i18n %}

{% block inner_content %}

<!-- Set new password heading -->
<h2 class="logo-font mb-4 text-black text-center">Set New Password</h2>
<hr>

{% if token_fail %}

<!-- Invalid reset link message -->
<p class="text-muted text-center">
    The password reset link is invalid or has already been used.
</p>

<div class="d-flex justify-content-center mt-4">
    <a href="{% url 'account_reset_password' %}" class="btn btn-black rounded-0 text-uppercase">
        Request New Link
    </a>
</div>

{% else %}

<!-- New password form -->
<form method="POST" action="{{ action_url }}">
    {% csrf_token %}

    <!-- New password field -->
    <div class="form-group">
        <label for="id_password1">New Password</label>
        <input class="form-control rounded-0" type="password" name="password1"
            placeholder="New Password" required id="id_password1">
    </div>

    <!-- Confirm new password field -->
    <div class="form-group">
        <label for="id_password2">Confirm New Password</label>
        <input class="form-control rounded-0" type="password" name="password2"
            placeholder="Confirm New Password" required id="id_password2">
    </div>

    <!-- Page actions -->
    <div class="d-flex justify-content-between align-items-center flex-wrap mt-4">
        <a href="{% url 'account_login' %}" class="btn btn-outline-black rounded-0 text-uppercase mb-2 mb-sm-0">
            Back to Sign In
        </a>

        <button class="btn btn-black rounded-0 text-uppercase mb-2 mb-sm-0" type="submit">
            Change Password
        </button>
    </div>
</form>

{% endif %}

{% endblock %}
