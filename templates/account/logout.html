{% extends "account/base.html" %}
{% load i18n %}

{% block inner_content %}

<h2 class="logo-font mb-4 text-black text-center">Sign Out</h2>
<hr>

<p class="text-center">
    Are you sure you want to sign out?
</p>

<form method="POST" action="{% url 'account_logout' %}">
    {% csrf_token %}

    <div class="d-flex justify-content-between align-items-center flex-wrap mt-4">
        <a href="{% url 'home' %}" class="btn btn-outline-black rounded-0 text-uppercase mb-2 mb-sm-0">
            Home
        </a>

        <button class="btn btn-black rounded-0 text-uppercase mb-2 mb-sm-0" type="submit">
            Sign Out
        </button>
    </div>
</form>

{% endblock %}
