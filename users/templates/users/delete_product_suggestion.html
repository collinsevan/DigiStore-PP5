{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="content-backdrop"></div>

<div class="container header-container">
    <div class="row">
        <div class="col">
            <div class="product-form-wrapper">
                <h2 class="logo-font">Product Suggestions</h2>
                <h5 class="text-muted">Delete your suggestion</h5>
                <hr>

                <p>
                    Are you sure you want to delete
                    <strong>{{ suggestion.suggested_name }}</strong>?
                </p>

                <p class="text-muted mb-4">
                    This action cannot be undone.
                </p>

                <form method="POST" action="{% url 'delete_product_suggestion' suggestion.id %}">
                    {% csrf_token %}

                    <a class="btn btn-outline-black rounded-0" href="{% url 'profile' %}">
                        Cancel
                    </a>

                    <button class="btn btn-danger rounded-0" type="submit"
                        onclick="return confirm('Are you sure you want to delete this suggestion? This cannot be undone.');">
                        Delete Suggestion
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
