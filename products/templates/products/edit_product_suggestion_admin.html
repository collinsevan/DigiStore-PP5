{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="content-backdrop"></div>

<div class="container header-container">
    <div class="row">
        <div class="col">
            <div class="product-form-wrapper">
                <h2 class="logo-font">Product Suggestions</h2>
                <h5 class="text-muted">Edit product suggestion</h5>
                <hr>

                <p class="text-muted">
                    Review and update the suggestion for
                    <strong>{{ suggestion.suggested_name }}</strong>.
                </p>

                <form method="POST" action="{% url 'edit_product_suggestion_admin' suggestion.id %}" class="form mb-2">
                    {% csrf_token %}

                    {{ form|crispy }}

                    <div class="text-right">
                        <a class="btn btn-outline-black rounded-0" href="{% url 'product_management' %}">
                            Cancel
                        </a>
                        <button class="btn btn-black rounded-0" type="submit">
                            Update Suggestion
                        </button>
                    </div>
                </form>

                <hr>

                <div class="text-right">
                    <a href="{% url 'add_product' %}?suggestion_id={{ suggestion.id }}"
                        class="btn btn-success rounded-0">
                        Create Product From Suggestion
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
