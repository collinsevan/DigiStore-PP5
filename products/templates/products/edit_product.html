{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="content-backdrop"></div>

<div class="container header-container">
    <div class="row">
        <div class="col">
            <div class="product-form-wrapper">
                <h2 class="logo-font">Product Management</h2>
                <h5 class="text-muted">Edit a product</h5>
                <hr>

                <form method="POST" action="{% url 'edit_product' product.id %}" class="form mb-2"
                    enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="text-right">
                        <a class="btn btn-outline-black rounded-0" href="{% url 'products' %}">
                            Cancel
                        </a>
                        <button class="btn btn-black rounded-0" type="submit">
                            Update Product
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
